# Development overrides: bind-mount source + hot reload (no production image rebuild).
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Same URLs as production compose: http://localhost:3000 and http://localhost:5000

name: medica

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/scripts:/app/scripts:ro
    command: ["node", "--watch", "src/server.js"]
    healthcheck:
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    command: ["npm", "run", "dev"]
    healthcheck:
      disable: true
